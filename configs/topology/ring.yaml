id: ring
kind: topology
description: Closed ring-road topology for wave damping experiments.
road:
  layout: ring
  lanes_count: 1
  segment_ids:
    - ring_main
  entry_segments:
    - ring_main
  exit_segments:
    - ring_main
  merge_nodes: []
  detector_locations:
    ring_main:
      - 0.25
      - 0.5
      - 0.75
control:
  supports_lane_change: false
  supported_action_fields:
    - desired_speed
    - desired_lane


id: ippo
kind: training
description: Independent PPO-style decentralized critic baseline with shared actor parameters.
algorithm: ippo
policy_mode: decentralized
action_profile: speed_headway
total_updates: 50
rollout_steps: 256
actor:
  observation_scope: local
  hidden_sizes:
    - 128
    - 128
critic:
  observation_scope: local
optimization:
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  update_epochs: 4
  minibatch_size: 256
  reward_scale: 0.05
  reward_clip: 10.0
